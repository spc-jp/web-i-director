<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web i Director</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sparkle-bg { background-image: radial-gradient(circle at center, #fff0f6 0%, #f8fafc 100%); }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }
        .ring-pulse::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 2px solid #ec4899; animation: pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <!-- サイドバー -->
    <aside class="w-[300px] bg-white border-r border-gray-200 flex flex-col">
        <div class="h-16 px-6 flex items-center justify-between border-b border-gray-100">
            <div class="flex items-center gap-2">
                <img src="https://ui-avatars.com/api/?name=i&background=ec4899&color=fff" class="w-8 h-8 rounded-full">
                <span class="font-bold text-gray-800">Web i Director</span>
            </div>
            <button id="settings-btn" class="p-2 text-gray-400 hover:text-gray-700 rounded-full transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
        
        <!-- 設定メニュー -->
        <div id="settings-menu" class="hidden absolute top-16 left-64 bg-white border border-gray-200 shadow-xl rounded-xl w-64 z-50 py-2">
            <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-pink-50 text-gray-700">01 診断 (飲食業)</button>
            <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-blue-50 text-gray-700">02 サイト自動作成</button>
            <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-orange-50 text-gray-700">03 チラシミッケ</button>
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col h-full bg-gray-50">
        <!-- 上部バー -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <div class="flex items-center gap-4 text-gray-500">
                <i data-lucide="monitor" class="w-5 h-5"></i>
                <i data-lucide="smartphone" class="w-5 h-5"></i>
                <span class="text-sm border-l pl-4 border-gray-300">プロジェクト未作成</span>
            </div>
            <button class="px-4 py-2 bg-gray-200 text-gray-600 rounded-md text-sm font-bold">
                <i data-lucide="globe" class="w-4 h-4 inline mr-2"></i>ワンクリック公開
            </button>
        </header>

        <!-- 中央表示エリア -->
        <div class="flex-1 flex items-center justify-center sparkle-bg">
            <div class="flex flex-col items-center">
                <div class="relative w-40 h-40 mb-10 flex items-center justify-center">
                    <div class="ring-pulse absolute inset-8"></div>
                    <div class="relative z-10 w-24 h-24 bg-white rounded-full shadow-2xl flex items-center justify-center">
                        <i data-lucide="wand-2" class="w-12 h-12 text-pink-500"></i>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">準備完了です！AIディレクターに指示を出してください</h2>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // 設定ボタンの開閉
        document.getElementById('settings-btn').addEventListener('click', (e) => { 
            e.stopPropagation(); 
            document.getElementById('settings-menu').classList.toggle('hidden'); 
        });
        document.addEventListener('click', () => document.getElementById('settings-menu').classList.add('hidden'));
    </script>
</body>
</html>
